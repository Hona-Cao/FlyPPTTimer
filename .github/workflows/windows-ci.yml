name: Windows CI

on:
  push:
    branches: [main, feature/v0.12-stability-ui, feature/v0.13-winui-rebuild]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore FlyPPTTimer.sln --configfile NuGet.Config -p:NuGetAudit=false
      - name: Build WinUI
        shell: pwsh
        run: |
          $kit = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory | Where-Object Name -Match '^\d+\.' | Sort-Object { [version]$_.Name } -Descending | Select-Object -First 1
          $tools = Join-Path $kit.FullName "x64"
          $env:Path = "$tools;$env:Path"
          dotnet build src/FlyPPTTimer.WinUI/FlyPPTTimer.WinUI.csproj -c Release -r win-x64 --no-restore -p:MakePriExeFullPath="$(Join-Path $tools 'makepri.exe')"
      - name: Test
        run: dotnet test tests/FlyPPTTimer.Tests/FlyPPTTimer.Tests.csproj -c Release --no-restore -p:NuGetAudit=false --logger "trx;LogFileName=v0.13.trx"

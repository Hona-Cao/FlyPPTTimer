name: Windows CI

on:
  push:
    branches: [main, feature/v0.12-stability-ui]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore tests/FlyPPTTimer.Tests/FlyPPTTimer.Tests.csproj
      - name: Build
        run: dotnet build src/FlyPPTTimer/FlyPPTTimer.csproj -c Release --no-restore
      - name: Test
        run: dotnet test tests/FlyPPTTimer.Tests/FlyPPTTimer.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=v0.12.1.trx"
